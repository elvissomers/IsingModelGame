<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ising Model Game</title>
    <meta name="description" content="An interactive web application of the Ising Model Game. Guess spins and map the couplings!">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Start Menu Screen -->
        <section id="start-menu" class="screen active">
            <h1 class="dynamic-title">Ising Game</h1>
            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="showScreen('level-select')">Start New Game</button>
                <button class="btn btn-secondary" onclick="window.location.href='tutorial-1.html'">Tutorial</button>
            </div>
        </section>

        <!-- Level Select Screen -->
        <section id="level-select" class="screen">
            <h2>Select Difficulty</h2>
            <div class="menu-buttons">
                <button class="btn btn-primary" onclick="startGame(1, 3)">Level 0 (1x3)</button>
                <button class="btn btn-primary" onclick="startGame(2, 2)">Level 1 (2x2)</button>
                <button class="btn btn-primary" onclick="startGame(3, 2)">Level 2 (3x2)</button>
                <button class="btn btn-primary" onclick="startGame(3, 3)">Level 3 (3x3)</button>
            </div>
            <button class="btn btn-back" onclick="showScreen('start-menu')">Back</button>
        </section>

        <!-- Game Screen -->
        <section id="game-screen" class="screen game-layout">
            <nav class="top-nav">
                <button class="btn btn-back" onclick="showScreen('level-select')">Back</button>
            </nav>
            <div class="game-body">
                <!-- Left: Scrollable History of Spins/Grids -->
                <div class="history-panel" id="history-panel">
                    <!-- Dynamic grids go here -->
                </div>

                <!-- Right: Control Panel / Sidebar -->
                <aside class="control-panel">
                    <h2 class="panel-title">Ising Game</h2>
                    <p class="status-text" id="tries-left">Tries left: 0</p>
                        <button class="btn btn-accent pulse" id="btn-submit-spins" onclick="submitSpins()">Submit Spin Guess</button>
                        <hr class="divider" />
                        <button class="btn btn-warning" id="btn-guess-couplings" onclick="startCouplingsMode()">Guess Couplings</button>
                        <button class="btn btn-secondary" id="btn-cancel-couplings" onclick="cancelCouplingsMode()" style="display: none;">Cancel</button>
                        <button class="btn btn-success disabled" id="btn-submit-couplings" onclick="submitCouplings()" disabled>Submit Couplings</button>
                    </div>
                </aside>
            </div>
        </section>

        <!-- Win Screen -->
        <section id="win-screen" class="screen">
            <h2 class="text-green">Congratulations on your win!</h2>
            <p style="font-size: 1.5rem; margin-bottom: 2rem;">Would you like to try again?</p>
            <button class="btn btn-primary" onclick="showScreen('level-select')">Play Again</button>
        </section>

        <!-- Lose Screen -->
        <section id="lose-screen" class="screen">
            <h2 class="text-red">You ran out of tries and lost!</h2>
            <p style="font-size: 1.5rem; margin-bottom: 2rem;">Would you like to try again?</p>
            <button class="btn btn-primary" onclick="showScreen('level-select')">Play Again</button>
        </section>

    </div>
    
    <!-- Modal for game over / viewing solution -->
    <div id="solution-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" class="text-red">Wrong Guess!</h2>
            <p id="modal-desc">Here were the correct couplings:</p>
            <div id="modal-grid-container" class="grid-container locked-grid"></div>
            <button class="btn btn-secondary mt-4" onclick="closeModal()">Close</button>
        </div>
    </div>

    <!-- Fireworks Canvas overlay -->
    <canvas id="fireworks-canvas"></canvas>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const screenParam = urlParams.get('screen');
        if (screenParam) {
            showScreen(screenParam);
            // Optionally clean up URL so refreshing doesn't stick
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
